worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name pokemart.filpo.com.br www.pokemart.filpo.com.br;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://pokemart.filpo.com.br$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name www.pokemart.filpo.com.br;
        ssl_certificate /etc/letsencrypt/live/pokemart.filpo.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pokemart.filpo.com.br/privkey.pem;
        return 301 https://pokemart.filpo.com.br$request_uri;
    }

    server {
        listen       443 ssl;
        server_name  pokemart.filpo.com.br;

        ssl_certificate /etc/letsencrypt/live/pokemart.filpo.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pokemart.filpo.com.br/privkey.pem;

        root   /usr/share/nginx/html;
        index  index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            proxy_pass http://localhost:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Garante que os cabeçalhos de segurança subam mesmo no proxy
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location ~* \.(woff2|ttf|eot|otf|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        location ~* \.(css|js)$ {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            expires off;
        }

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    }
}
