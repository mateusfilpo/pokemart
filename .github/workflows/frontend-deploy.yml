name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pokemart-app:latest
            ${{ secrets.DOCKER_USERNAME }}/pokemart-app:v1.4.4

  deploy:
    name: Deploy to GCP VM
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~
            
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/pokemart-app:v1.4.4
            
            sudo docker rm -f pokemart-front || true
            
            sudo docker run -d \
                --name pokemart-front \
                --restart unless-stopped \
                --network host \
                -v /home/mateusfilpo27/data/certbot/conf:/etc/letsencrypt:ro \
                -v /home/mateusfilpo27/data/certbot/www:/var/www/certbot:ro \
                ${{ secrets.DOCKER_USERNAME }}/pokemart-app:v1.4.4
                
            sudo docker image prune -f
